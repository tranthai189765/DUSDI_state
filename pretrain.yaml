defaults:
  - env: env_config.yaml
  - agent: dusdi_diayn

# mode
reward_free: true
obs_type: states # [states, pixels]
frame_stack: 3 # only works if obs_type=pixels
action_repeat: 1
discount: 0.99
# train settings — matched to TIME's ant config
num_train_frames: 2000010
num_seed_frames: 4000
# eval
eval_every_frames: 10000
num_eval_episodes: 10
# replay buffer
replay_buffer_size: 1000000
replay_buffer_num_workers: 4
batch_size: ${agent.batch_size}
nstep: ${agent.nstep}
update_encoder: true # should always be true for pre-training
# misc
seed: 1
cuda_id: 0
save_video: false
save_train_video: false
use_tb: false
use_wandb: true

her: false

# n_env=1 + update_ratio=1 matches TIME's single-env, 1 update/step setup
update_ratio: 1
n_env: 1

# task settings
domain: ant_v5

exp_nm: ""

exp_group:
  ${domain}
  ${agent.name}
  ${exp_nm}


experiment:
  seed:${seed}
  ${exp_group}

# snapshot
snapshots: [100000, 500000, 1000000, 2000000, 3000000, 4000000]
snapshot_dir: ../../../models/${obs_type}/${domain}/${experiment}/${seed}


hydra:
  run:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${experiment}
  sweep:
    dir: ./exp_sweep/${now:%Y.%m.%d}/${now:%H%M}_${experiment}
    subdir: ${hydra.job.num}
